<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumo aos 200.000 — Volume &amp; Contratos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --papel:#EDE7D8;
  --papel-escuro:#E1D9C4;
  --tinta:#22281F;
  --tinta-suave:#5B5A47;
  --verde-lucro:#3B6E4F;
  --verde-lucro-fundo:#DEE8DF;
  --vermelho-prejuizo:#A13D2E;
  --vermelho-prejuizo-fundo:#EFDDD6;
  --ambar-alerta:#B8862E;
  --ambar-alerta-fundo:#EFE3C8;
  --linha:#C9C1A9;
  --linha-forte:#AFA689;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'IBM Plex Sans', sans-serif;
  font-size:16px;
  background:var(--papel);
  color:var(--tinta);
  min-height:100vh;
  background-image:repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(34,40,31,0.035) 28px);
}
a{ color:inherit; }
.num{ font-family:'IBM Plex Mono', monospace; font-variant-numeric:tabular-nums; }

.membrete{ display:flex; justify-content:space-between; align-items:flex-end; padding:22px 32px 16px; border-bottom:3px double var(--linha-forte); flex-wrap:wrap; gap:10px; }
.membrete-marca{ font-family:'Fraunces', serif; font-weight:700; font-size:25px; text-decoration:none; color:var(--tinta); }
.membrete-eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--tinta-suave); margin-bottom:4px; }
.membrete-meta{ text-align:right; font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--tinta-suave); line-height:1.7; }
.membrete-meta strong{ color:var(--tinta); }

.abas{ display:flex; gap:2px; padding:0 28px; background:var(--papel-escuro); border-bottom:1px solid var(--linha-forte); overflow-x:auto; }
.aba{ font-family:'IBM Plex Mono', monospace; font-size:12.5px; letter-spacing:0.05em; text-transform:uppercase; color:var(--tinta-suave); text-decoration:none; padding:12px 18px 10px; border:1px solid transparent; border-bottom:none; white-space:nowrap; }
.aba.ativa{ background:var(--papel); color:var(--tinta); font-weight:600; border-color:var(--linha-forte); border-top:2px solid var(--verde-lucro); margin-top:-1px; }
.aba:not(.ativa):hover{ color:var(--tinta); }

main{ max-width:1000px; margin:0 auto; padding:42px 28px 80px; }

.secao{ margin-bottom:38px; }
.secao-header{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:16px; padding-bottom:9px; border-bottom:2px solid var(--tinta); flex-wrap:wrap; gap:6px; }
.secao-header h2{ font-family:'Fraunces', serif; font-size:19px; font-weight:600; }
.secao-header .n-amostra{ font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--tinta-suave); }
.secao-intro{ font-size:14.5px; color:var(--tinta-suave); margin-bottom:16px; line-height:1.6; }

.linha-item{ display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-bottom:1px solid var(--linha); font-size:15.5px; }
.linha-item:last-child{ border-bottom:none; }
.linha-item .rot{ color:var(--tinta-suave); }
.linha-item .val{ font-weight:600; }
.val.pos{ color:var(--verde-lucro); }
.val.neg{ color:var(--vermelho-prejuizo); }
.val.neutro{ color:var(--ambar-alerta); }

table.planilha{ width:100%; border-collapse:collapse; font-size:14.5px; }
table.planilha th{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--tinta-suave); text-align:left; padding:9px 11px; border-bottom:2px solid var(--tinta); }
table.planilha td{ padding:9px 11px; border-bottom:1px solid var(--linha); font-family:'IBM Plex Mono', monospace; }
table.planilha tr:hover td{ background:rgba(34,40,31,0.03); }

.grade{ display:grid; border:1px solid var(--linha-forte); }
.celula{ padding:17px 19px; border-right:1px solid var(--linha); border-bottom:1px solid var(--linha); }
.celula:last-child{ border-right:none; }
.celula .rot{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--tinta-suave); margin-bottom:7px; }
.celula .val{ font-family:'IBM Plex Mono', monospace; font-size:23px; font-weight:600; }

.badge-mock{ display:inline-block; font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ambar-alerta); border:1px solid var(--ambar-alerta); padding:3px 8px; margin-left:10px; }
.badge-alerta-n{ display:inline-flex; align-items:center; gap:5px; font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--ambar-alerta); background:var(--ambar-alerta-fundo); padding:3px 9px; border-radius:2px; }

.nota-analista{ border-left:3px solid var(--ambar-alerta); background:var(--ambar-alerta-fundo); padding:16px 20px; font-size:14.5px; line-height:1.65; margin:20px 0; }
.nota-analista strong{ display:block; font-family:'IBM Plex Mono', monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:7px; color:var(--tinta); }

footer{ max-width:1000px; margin:0 auto; padding:0 28px 48px; font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--tinta-suave); text-align:center; }

.grade2{grid-template-columns:repeat(2,1fr);}
.destaque{ border:2px solid var(--vermelho-prejuizo); padding:22px 24px; margin:20px 0; background:var(--vermelho-prejuizo-fundo); font-size:14.5px; line-height:1.6; display:none; }
.destaque.positivo{ border-color:var(--verde-lucro); background:var(--verde-lucro-fundo); }
.destaque strong.titulo{ display:block; font-family:'Fraunces', serif; font-size:16px; margin-bottom:8px; }
.destaque.positivo strong.titulo{ color:var(--verde-lucro); }
.destaque:not(.positivo) strong.titulo{ color:var(--vermelho-prejuizo); }
.carregando{ text-align:center; padding:60px 20px; font-family:'IBM Plex Mono', monospace; color:var(--tinta-suave); }
.badge-alerta-n{ display:inline-flex; align-items:center; gap:5px; font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--ambar-alerta); background:var(--ambar-alerta-fundo); padding:3px 9px; border-radius:2px; margin-left:8px; }
</style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <main id="conteudo" style="display:none;">

    <div class="destaque" id="destaque"></div>

    <section class="secao">
      <div class="secao-header"><h2>Expectancy por faixa de contratos operados</h2><span class="n-amostra">"Cantidad" = contratos totais da operação, incluindo parciais</span></div>
      <table class="planilha">
        <thead><tr><th>Faixa</th><th>n</th><th>Resultado</th><th>Win rate</th><th>Expectancy</th></tr></thead>
        <tbody id="corpo-faixas"></tbody>
      </table>
    </section>

    <section class="secao">
      <div class="secao-header"><h2>Contratos médios: ganhadoras vs. perdedoras</h2></div>
      <div class="grade grade2" id="grade-medias"></div>
      <div class="secao-intro" id="nota-duracao"></div>
    </section>

  </main>

  <div class="carregando" id="carregando">Carregando dados reais...</div>

  <footer>Dados ao vivo · acumulado total do usuário</footer>

<script src="nav.js"></script>
<script src="stats.js"></script>
<script>
  const LIMIAR_N = 30;

  async function carregar() {
    const sessao = iniciarPagina({ paginaAtiva: 'volume_contratos.html', mostrarAbas: true });
    if (!sessao) return;

    try {
      const resp = await fetch(APPSCRIPT_URL + '?action=trades&token=' + encodeURIComponent(sessao.token));
      const data = await resp.json();
      if (!data.ok) {
        document.getElementById('carregando').textContent = 'Erro: ' + data.error;
        return;
      }

      const trades = data.trades;
      if (trades.length === 0) {
        document.getElementById('carregando').textContent = 'Nenhuma operação carregada ainda.';
        return;
      }

      const faixas = calcularPorFaixaContratos(trades);
      document.getElementById('corpo-faixas').innerHTML = faixas.map(g => {
        if (g.n === 0) return `<tr><td>${g.chave} contratos<span class="badge-alerta-n">sem dados</span></td><td>0</td><td>—</td><td>—</td><td>—</td></tr>`;
        const corResultado = g.resultado >= 0 ? 'var(--verde-lucro)' : 'var(--vermelho-prejuizo)';
        const corExp = g.expectancy >= 0 ? 'var(--verde-lucro)' : 'var(--vermelho-prejuizo)';
        const badge = g.n < LIMIAR_N ? '<span class="badge-alerta-n">n baixo</span>' : '';
        return `<tr>
          <td>${g.chave} contratos${badge}</td>
          <td>${g.n}</td>
          <td style="color:${corResultado}">${formatarReais(g.resultado)}</td>
          <td>${g.winRate.toFixed(1)}%</td>
          <td style="color:${corExp}">${formatarReais(g.expectancy)}</td>
        </tr>`;
      }).join('');

      const mediaContratos = calcularMediaPorResultado(trades, 'Cantidad');
      document.getElementById('grade-medias').innerHTML = `
        <div class="celula"><div class="rot">Operações ganhadoras (n=${mediaContratos.ganhadoras.n})</div>
          <div class="val" style="color:var(--verde-lucro)">${mediaContratos.ganhadoras.media !== null ? mediaContratos.ganhadoras.media.toFixed(1) : '—'} contratos (média)</div></div>
        <div class="celula" style="border-right:none;"><div class="rot">Operações perdedoras (n=${mediaContratos.perdedoras.n})</div>
          <div class="val" style="color:var(--vermelho-prejuizo)">${mediaContratos.perdedoras.media !== null ? mediaContratos.perdedoras.media.toFixed(1) : '—'} contratos (média)</div></div>`;

      const mediaDuracao = calcularMediaPorResultado(trades, 'Duracion_min');
      if (mediaDuracao.ganhadoras.media !== null && mediaDuracao.perdedoras.media !== null) {
        document.getElementById('nota-duracao').textContent =
          'Duração média: operações ganhadoras duram ' + mediaDuracao.ganhadoras.media.toFixed(1) +
          ' minutos; perdedoras, ' + mediaDuracao.perdedoras.media.toFixed(1) + ' minutos.';
      }

      // Destaque: comparar faixa mais leve vs. mais pesada com n suficiente
      const comAmostra = faixas.filter(f => f.n >= LIMIAR_N);
      const destaqueEl = document.getElementById('destaque');
      const mediaGanh = mediaContratos.ganhadoras.media;
      const mediaPerd = mediaContratos.perdedoras.media;

      if (mediaGanh !== null && mediaPerd !== null && mediaContratos.ganhadoras.n >= LIMIAR_N && mediaContratos.perdedoras.n >= LIMIAR_N) {
        destaqueEl.style.display = 'block';
        if (mediaPerd > mediaGanh * 1.3) {
          destaqueEl.className = 'destaque';
          destaqueEl.innerHTML = '<strong class="titulo">Achado desta página</strong>' +
            'O tamanho médio de posição em operações perdedoras (' + mediaPerd.toFixed(1) +
            ' contratos) é maior que o das ganhadoras (' + mediaGanh.toFixed(1) +
            ' contratos) — padrão de aumentar posição quando a operação vai mal.';
        } else {
          destaqueEl.className = 'destaque positivo';
          destaqueEl.innerHTML = '<strong class="titulo">Achado desta página</strong>' +
            'Não há evidência de que você aumenta o tamanho da posição em operações perdedoras — ' +
            'os tamanhos médios de ganhadoras (' + mediaGanh.toFixed(1) + ') e perdedoras (' + mediaPerd.toFixed(1) + ') são parecidos.';
        }
      }

      document.getElementById('carregando').style.display = 'none';
      document.getElementById('conteudo').style.display = 'block';
    } catch (err) {
      document.getElementById('carregando').textContent = 'Erro de conexão ao buscar dados.';
    }
  }

  carregar();
</script>
</body>
</html>
